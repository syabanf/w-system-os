version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wit
      POSTGRES_PASSWORD: wit
      POSTGRES_DB: wit_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wit -d wit_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: API gateway running locally. Comment out and run via `make dev`
  # if you prefer host-side go runs for faster iteration.
  api-gateway:
    profiles: ["full"]
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: api-gateway
    container_name: wit-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://wit:wit@postgres:5432/wit_erp?sslmode=disable
      HTTP_PORT: 8080
      LOG_PRETTY: "false"
      DB_AUTO_MIGRATE: "true"
      DB_MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"

  hr-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: hr-service
    container_name: wit-hr-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://wit:wit@postgres:5432/wit_erp?sslmode=disable
      HR_HTTP_PORT: 8081
      LOG_PRETTY: "false"
      DB_AUTO_MIGRATE: "true"
      DB_MIGRATIONS_DIR: /app/migrations
    ports:
      - "8081:8081"

volumes:
  postgres_data:
